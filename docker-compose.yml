services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-1:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    expose:
      - "8000"
    depends_on:
      - redis

  backend-2:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    expose:
      - "8000"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - nginx